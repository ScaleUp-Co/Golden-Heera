<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>My Wishlist | Golden Heera Fashion Jewellery</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#A67C2E',
              background: '#FAF7F2',
              'surface-container': '#F4EEE6',
              'on-surface': '#1A1A1A',
              'on-surface-variant': '#666666',
              'outline-variant': '#E8E1D8'
            },
            fontFamily: {
              serif: ['Cormorant Garamond', 'serif'],
              sans: ['Inter', 'sans-serif']
            },
            spacing: {
              'margin-mobile': '20px',
              'gutter': '24px',
              'container-max': '1440px',
              'margin-desktop': '80px'
            }
          }
        }
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .luxury-shadow {
            box-shadow: 0 10px 30px -10px rgba(166, 124, 46, 0.08);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-sans selection:bg-primary/20 pb-[60px] md:pb-0">

<!-- Global Header placeholder -->
<div id="global-header"></div>

<main class="max-w-[1440px] mx-auto px-margin-mobile md:px-margin-desktop py-12">
    <!-- Breadcrumbs -->
    <nav class="flex items-center space-x-2 mb-6 text-[10px] font-bold uppercase tracking-widest text-[#666666]">
        <a class="hover:text-primary" href="index.html">Home</a>
        <span class="material-symbols-outlined text-[9px] font-bold">chevron_right</span>
        <span class="text-primary font-bold">My Saved Masterpieces</span>
    </nav>

    <!-- Page Title -->
    <header class="mb-10 text-center md:text-left">
        <h1 class="font-serif text-3xl md:text-4xl font-medium mb-2">My Saved Masterpieces</h1>
        <p class="text-on-surface-variant text-xs font-sans">Your private selection of beautiful fashion and imitation jewellery.</p>
    </header>

    <!-- Wishlist Grid -->
    <section id="wishlist-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Loaded dynamically -->
    </section>
</main>

<!-- Global Footer placeholder -->
<div id="global-footer"></div>

<script src="products.js"></script>
<script src="app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        renderWishlist();
    });

    function renderWishlist() {
        const wishlist = getWishlist();
        const grid = document.getElementById('wishlist-grid');
        grid.innerHTML = '';

        if (wishlist.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full py-20 text-center border border-[#E8E1D8] bg-white luxury-shadow rounded-sm">
                    <span class="material-symbols-outlined text-7xl text-primary mb-4" style="font-variation-settings: 'FILL' 1;">favorite</span>
                    <h3 class="font-serif text-lg font-bold text-on-surface mb-2">Your wishlist is currently empty</h3>
                    <p class="text-xs text-[#666666]/80 mb-6">Explore our collections and tap the heart icon to save your favorite items.</p>
                    <a href="collections.html" class="bg-[#A67C2E] text-white px-10 py-4 uppercase font-sans text-xs tracking-widest hover:opacity-90 transition-all inline-block font-semibold rounded-none">Explore Collections</a>
                </div>
            `;
            return;
        }

        wishlist.forEach(id => {
            const p = PRODUCTS_DATA.find(x => x.id === id);
            if (!p) return;

            const discount = Math.round((p.originalPrice - p.price) / p.originalPrice * 100);
            const card = document.createElement('div');
            card.className = 'bg-white border border-[#E8E1D8] group relative flex flex-col justify-between cursor-pointer p-4 hover:shadow-lg transition-shadow rounded-sm';
            card.setAttribute('onclick', `window.location.href="product-detail.html?product_id=${p.id}"`);
            
            card.innerHTML = `
                <div class="relative w-full aspect-square overflow-hidden bg-surface-container mb-4">
                    <img class="w-full h-full object-cover transition-opacity duration-500 group-hover:opacity-0" src="${p.image}" alt="${p.name}"/>
                    <img class="w-full h-full object-cover absolute top-0 left-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500" src="${p.hoverImage}" alt="${p.name} Alternate"/>
                    
                    <button class="absolute top-2 right-2 bg-white/90 p-1.5 rounded-full text-primary shadow-xs hover:scale-105 transition-transform" onclick="event.stopPropagation(); removeWishItem(${p.id})">
                        <span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 1;">favorite</span>
                    </button>
                </div>
                <div>
                    <div class="flex items-center gap-1 mb-1 text-[#A67C2E]">
                        <span class="material-symbols-outlined text-xs" style="font-variation-settings: 'FILL' 1;">star</span>
                        <span class="text-[10px] font-bold text-on-surface-variant">${p.rating} (${p.reviewsCount})</span>
                    </div>
                    <h4 class="font-serif text-sm font-bold text-on-surface line-clamp-1 mb-2">${p.name}</h4>
                    <div class="flex items-baseline gap-2 mb-3">
                        <span class="text-xs font-bold text-primary">₹${p.price.toLocaleString()}</span>
                        <span class="text-[10px] text-[#666666]/60 line-through">₹${p.originalPrice.toLocaleString()}</span>
                        <span class="inline-block bg-[#A67C2E]/10 text-primary text-[8px] font-bold px-1.5 py-0.5 rounded-sm">${discount}% OFF</span>
                    </div>
                </div>
                <div class="space-y-2 mt-auto">
                    <button onclick="event.stopPropagation(); moveToBag(${p.id})" class="w-full bg-[#A67C2E] text-white py-2.5 text-[10px] uppercase font-sans font-bold tracking-widest hover:opacity-90 flex items-center justify-center gap-1 rounded-none">
                        <span class="material-symbols-outlined text-sm">shopping_cart</span> Move to Bag
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function removeWishItem(id) {
        toggleWishlist(id);
        renderWishlist();
    }

    function moveToBag(id) {
        addToCart(id);
        // Remove from wishlist
        let wishlist = getWishlist();
        wishlist = wishlist.filter(x => x !== id);
        localStorage.setItem('gh_wishlist', JSON.stringify(wishlist));
        updateBadges();
        renderWishlist();
    }
</script>
</body>
</html>

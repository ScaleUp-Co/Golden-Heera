<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>My Wishlist | Golden Heera Premium Jewellery</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&amp;family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed pb-[60px] md:pb-0">

<!-- Global Header placeholder -->
<div id="global-header"></div>

<main class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-12">
    <!-- Page Title -->
    <header class="mb-10 text-center md:text-left">
        <h1 class="font-headline-md text-headline-md font-bold mb-2">My Saved Masterpieces</h1>
        <p class="text-on-surface-variant font-body-md text-sm">Your private selection of beautiful fashion and imitation jewellery.</p>
    </header>

    <!-- Wishlist Grid -->
    <section id="wishlist-grid" class="grid grid-cols-2 md:grid-cols-4 gap-x-gutter gap-y-12">
        <!-- Loaded dynamically -->
    </section>
</main>

<!-- Global Footer placeholder -->
<div id="global-footer"></div>

<script src="products.js"></script>
<script src="app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        renderWishlist();
    });

    function renderWishlist() {
        const wishlist = getWishlist();
        const grid = document.getElementById('wishlist-grid');
        grid.innerHTML = '';

        if (wishlist.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full py-20 text-center border border-outline-variant/30 bg-white">
                    <span class="material-symbols-outlined text-5xl text-primary mb-4">favorite</span>
                    <p class="font-display-lg text-headline-sm text-on-surface-variant italic mb-6">Your wishlist is currently empty.</p>
                    <a href="collections.html" class="bg-primary text-white px-10 py-4 uppercase font-label-sm tracking-widest hover:opacity-90 transition-all inline-block font-semibold">Explore Collections</a>
                </div>
            `;
            return;
        }

        wishlist.forEach(id => {
            const p = PRODUCTS_DATA.find(x => x.id === id);
            if (!p) return;

            const discount = Math.round((p.originalPrice - p.price) / p.originalPrice * 100);
            const card = document.createElement('div');
            card.className = 'bg-white border border-outline-variant/30 group relative flex flex-col justify-between cursor-pointer p-4 hover:shadow-lg transition-shadow';
            card.setAttribute('onclick', `window.location.href="product-detail.html?product_id=${p.id}"`);
            
            card.innerHTML = `
                <div class="relative w-full aspect-square overflow-hidden bg-surface-container-lowest mb-4">
                    <img class="w-full h-full object-cover transition-opacity duration-500 group-hover:opacity-0" src="${p.image}" alt="${p.name}"/>
                    <img class="w-full h-full object-cover absolute top-0 left-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500" src="${p.hoverImage}" alt="${p.name} Alternate"/>
                    
                    <button class="absolute top-2 right-2 bg-white/90 p-1.5 rounded-full text-primary shadow-xs hover:scale-105 transition-transform" onclick="event.stopPropagation(); removeWishItem(${p.id})">
                        <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">favorite</span>
                    </button>
                </div>
                <div>
                    <div class="flex items-center gap-1 mb-1">
                        <span class="material-symbols-outlined text-xs text-primary" style="font-variation-settings: 'FILL' 1;">star</span>
                        <span class="text-[10px] font-bold text-on-surface-variant">${p.rating} (${p.reviewsCount})</span>
                    </div>
                    <h4 class="font-body-md text-xs font-semibold text-on-background line-clamp-1 mb-2">${p.name}</h4>
                    <div class="flex items-baseline gap-2 mb-3">
                        <span class="text-sm font-bold text-primary">₹${p.price.toLocaleString()}</span>
                        <span class="text-[10px] text-on-surface-variant/50 line-through">₹${p.originalPrice.toLocaleString()}</span>
                        <span class="text-[10px] text-primary font-bold">${discount}% OFF</span>
                    </div>
                </div>
                <div class="space-y-2 mt-auto">
                    <button onclick="event.stopPropagation(); moveToBag(${p.id})" class="w-full bg-primary text-white py-2 text-xs uppercase font-label-sm tracking-widest hover:opacity-90 flex items-center justify-center gap-1 font-semibold">
                        <span class="material-symbols-outlined text-xs">shopping_cart</span> Move to Bag
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function removeWishItem(id) {
        toggleWishlist(id);
        renderWishlist();
    }

    function moveToBag(id) {
        addToCart(id);
        // Remove from wishlist
        let wishlist = getWishlist();
        wishlist = wishlist.filter(x => x !== id);
        localStorage.setItem('gh_wishlist', JSON.stringify(wishlist));
        updateBadges();
        renderWishlist();
    }
</script>
</body>
</html>
